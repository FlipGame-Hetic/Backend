services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CRATE: api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    depends_on:
      mosquitto:
        condition: service_healthy

  mqtt-bridge:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CRATE: mqtt-bridge
    depends_on:
      mosquitto:
        condition: service_healthy
      api:
        condition: service_healthy

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"        # MQTT over WebSocket (for browser clients via mqtt.js)
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.d:/etc/nginx/default.d   # server block + WebSocket proxy rules
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/nginx/health"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3