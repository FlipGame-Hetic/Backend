services:
  api:
    build:
      context: ../        # Flipper/ — includes both Backend/ and Lucy/ path deps
      dockerfile: Backend/Dockerfile
      args:
        CRATE: api
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    depends_on:
      mosquitto:
        condition: service_healthy

  mqtt-bridge:
    build:
      context: ../        # Flipper/ — same context as api for cache sharing
      dockerfile: Backend/Dockerfile
      args:
        CRATE: mqtt-bridge
    depends_on:
      mosquitto:
        condition: service_healthy
      api:
        condition: service_healthy

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3